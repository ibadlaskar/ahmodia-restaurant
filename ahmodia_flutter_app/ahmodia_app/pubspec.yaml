name: ahmodia_restaurant
description: Ahmodia Restaurant - Order fresh meals delivered to your door.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Razorpay Payments
  razorpay_flutter: ^1.3.6

  # State Management
  provider: ^6.1.1

  # UI & Utils
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  fluttertoast: ^8.2.4
  shimmer: ^3.0.0
  lottie: ^3.0.0
  url_launcher: ^6.2.3
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
